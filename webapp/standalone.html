<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Innodisk Product Selector</title>
  <script type="importmap">
  {
    "imports": {
      "react":            "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "htm":              "https://esm.sh/htm@3.1.1"
    }
  }
  </script>
  <style>
    /* ── Reset & Variables ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue:   #0055B3;
      --blue-h: #0044A0;
      --bg:     #F0F4F8;
      --surf:   #FFFFFF;
      --head:   #0A1628;
      --text:   #1E293B;
      --muted:  #64748B;
      --border: #E2E8F0;
      --green:  #16A34A;
      --purple: #7C3AED;
      --amber:  #D97706;
      --red:    #DC2626;
      --tops:   #0284C7;
      --r:      8px;
      --sh:     0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --sh-md:  0 4px 6px rgba(0,0,0,.07), 0 2px 4px rgba(0,0,0,.06);
      --sh-lg:  0 10px 15px rgba(0,0,0,.1), 0 4px 6px rgba(0,0,0,.05);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
           background: var(--bg); color: var(--text); line-height: 1.5; min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }

    /* ── Header ── */
    .hdr { background: var(--head); color:#fff; padding:0 24px; height:56px;
           position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,.25); }
    .hdr-in { max-width:1400px; margin:0 auto; height:100%; display:flex; align-items:center; gap:20px; }
    .brand { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .brand-hex { font-size:22px; color:#60A5FA; }
    .brand-name { font-size:16px; font-weight:700; }
    .brand-sub  { font-size:13px; color:#94A3B8; }
    .nav { display:flex; gap:4px; flex:1; }
    .nav-btn { background:none; border:none; color:#94A3B8; padding:6px 14px; border-radius:6px;
               font-size:13px; font-weight:500; transition:background .15s, color .15s; }
    .nav-btn:hover { background:rgba(255,255,255,.08); color:#fff; }
    .nav-btn.active { background:rgba(255,255,255,.12); color:#fff; }
    .hdr-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }
    .catalog-ct { font-size:12px; color:#64748B; }

    /* ── Buttons ── */
    .btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px;
           border-radius:var(--r); font-size:14px; font-weight:500; border:none;
           transition:background .15s, opacity .15s; }
    .btn:active { transform:scale(.98); }
    .btn:disabled { opacity:.45; cursor:not-allowed; }
    .btn-primary  { background:var(--blue); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:var(--blue-h); }
    .btn-secondary { background:transparent; color:#CBD5E1; border:1px solid #334155; }
    .btn-secondary:hover { background:rgba(255,255,255,.06); }
    .btn-compare  { background:var(--purple); color:#fff; font-size:13px; padding:6px 12px; }
    .btn-compare:hover { background:#6D28D9; }
    .btn-icon     { background:rgba(255,255,255,.08); border:none; color:#94A3B8; width:34px;
                    height:34px; border-radius:6px; font-size:16px; display:flex;
                    align-items:center; justify-content:center; padding:0; }
    .btn-icon:hover { background:rgba(255,255,255,.14); color:#fff; }
    .btn-saved    { background:var(--green) !important; }
    .btn-link     { background:none; border:none; color:var(--blue); font-size:13px;
                    text-decoration:underline; padding:0 4px; }

    /* ── Main ── */
    .main { flex:1; max-width:1400px; width:100%; margin:0 auto;
            padding:24px 24px 48px; display:flex; flex-direction:column; gap:20px; }
    .app  { display:flex; flex-direction:column; min-height:100vh; }

    /* ── AI Summary ── */
    .ai-card { background:linear-gradient(135deg,#EFF6FF,#F0FDF4); border:1px solid #BFDBFE;
               border-radius:var(--r); padding:16px 20px; display:flex; gap:14px;
               align-items:flex-start; position:relative; }
    .ai-icon  { font-size:20px; flex-shrink:0; margin-top:2px; }
    .ai-text  { flex:1; }
    .ai-rec   { font-size:14px; line-height:1.6; }
    .ai-trade { font-size:13px; color:#6B7280; margin-top:6px; line-height:1.5; }
    .clear-btn { background:none; border:none; color:#9CA3AF; font-size:16px; padding:2px 6px; }
    .clear-btn:hover { color:var(--red); }

    /* ── Error Banner ── */
    .err-banner { background:#FEF2F2; border:1px solid #FECACA; color:#991B1B;
                  border-radius:var(--r); padding:12px 16px; font-size:13px;
                  display:flex; align-items:center; gap:8px; }

    /* ── Search ── */
    .search-section { display:flex; flex-direction:column; gap:12px; }
    .search-form    { display:flex; flex-direction:column; gap:6px; }
    .search-wrap    { display:flex; gap:8px; align-items:flex-start; }
    .search-ta { flex:1; padding:12px 14px; border:2px solid var(--border); border-radius:var(--r);
                 font-size:14px; resize:vertical; line-height:1.5; transition:border-color .15s;
                 background:var(--surf); color:var(--text); }
    .search-ta:focus { outline:none; border-color:var(--blue); }
    .search-btn { padding:12px 18px; font-size:18px; flex-shrink:0; min-width:52px; justify-content:center; }
    .search-hint { font-size:11px; color:var(--muted); padding-left:2px; }
    .examples   { display:flex; flex-wrap:wrap; align-items:center; gap:8px; }
    .ex-label   { font-size:12px; color:var(--muted); font-weight:500; }
    .ex-chip    { background:var(--surf); border:1px solid var(--border); color:var(--blue);
                  padding:4px 10px; border-radius:100px; font-size:12px; transition:background .12s; }
    .ex-chip:hover:not(:disabled) { background:#EFF6FF; border-color:var(--blue); }

    /* ── Filter Bar ── */
    .filter-bar   { display:flex; flex-wrap:wrap; align-items:center; gap:6px; padding:8px 12px;
                    background:var(--surf); border:1px solid var(--border); border-radius:8px; }
    .filter-sep   { width:1px; height:18px; background:var(--border); margin:0 4px; flex-shrink:0; }
    .filter-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; flex-shrink:0; }
    .fchip        { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:100px;
                    border:1px solid var(--border); background:#fff; font-size:12px; cursor:pointer;
                    color:var(--text); transition:all .12s; white-space:nowrap; }
    .fchip:hover  { border-color:#94A3B8; background:#F8FAFC; }
    .fchip.on     { background:var(--blue); border-color:var(--blue); color:#fff; font-weight:600; }
    .fchip .fct   { font-size:10px; opacity:.75; }
    .fchip.on .fct{ opacity:.9; }
    .fclr         { font-size:11px; color:var(--muted); cursor:pointer; padding:2px 6px; border-radius:4px;
                    border:none; background:none; margin-left:auto; }
    .fclr:hover   { color:var(--red,#EF4444); background:#FEF2F2; }
    .filter-sum   { font-size:12px; color:var(--muted); padding:2px 4px; }

    /* ── Product List ── */
    .results-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .results-ct  { font-size:13px; color:var(--muted); }
    .compare-ct  { font-size:12px; background:#EDE9FE; color:#5B21B6;
                   padding:3px 10px; border-radius:100px; font-weight:500; }
    .section     { display:flex; flex-direction:column; gap:12px; margin-bottom:24px; }
    .sec-label   { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase;
                   color:var(--muted); padding-bottom:4px; border-bottom:1px solid var(--border); }
    .grid        { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
    .empty       { text-align:center; padding:60px 20px; color:var(--muted); }
    .empty-icon  { font-size:40px; margin-bottom:12px; }
    .empty h3    { font-size:16px; color:var(--text); margin-bottom:8px; }
    .empty p     { font-size:14px; }

    /* ── Product Card ── */
    .card { background:var(--surf); border:1px solid var(--border); border-radius:var(--r);
            padding:16px; display:flex; flex-direction:column; gap:12px; box-shadow:var(--sh);
            transition:box-shadow .15s, border-color .15s; position:relative; overflow:hidden; }
    .card:hover  { box-shadow:var(--sh-md); border-color:#CBD5E1; }
    .card.sel    { border-color:var(--purple) !important;
                   box-shadow:0 0 0 2px rgba(124,58,237,.12),var(--sh-md) !important; }
    .card.matched { border-color:#BFDBFE; }
    .match-badge { position:absolute; top:0; right:0; font-size:11px; font-weight:600;
                   color:#fff; padding:3px 10px 3px 12px; border-radius:0 var(--r) 0 var(--r); }
    .card-hdr    { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    .card-title-g { display:flex; align-items:center; gap:10px; }
    .plat-icon   { font-size:20px; flex-shrink:0; }
    .part-no     { font-size:16px; font-weight:700; line-height:1.2; }
    .card-tags   { display:flex; gap:6px; margin-top:4px; }
    .tag         { font-size:10px; font-weight:600; padding:1px 6px; border-radius:4px;
                   border:1px solid; text-transform:uppercase; letter-spacing:.4px; }
    .tag-bu      { background:#F0F9FF; color:#0369A1; border-color:#BAE6FD; }
    .cmp-toggle  { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted);
                   cursor:pointer; flex-shrink:0; white-space:nowrap; margin-top:2px; }
    .cmp-toggle:hover { color:var(--text); }
    .cmp-toggle input { accent-color:var(--purple); }
    .card-proc   { font-size:12px; color:var(--muted); line-height:1.4;
                   border-top:1px solid var(--border); padding-top:8px; }
    .card-cores  { font-size:11px; color:var(--muted); margin-top:2px; }

    /* spec grid */
    .spec-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .spec-cell { background:#F8FAFC; border-radius:6px; padding:8px 10px;
                 display:flex; flex-direction:column; gap:2px; }
    .sc-hl     { background:#EFF6FF; }
    .sc-temp   { background:#F0FDF4; }
    .sc-lbl    { font-size:10px; font-weight:600; text-transform:uppercase;
                 letter-spacing:.6px; color:var(--muted); }
    .sc-val    { font-size:14px; font-weight:600; }
    .tops-val  { color:var(--tops); font-size:15px; }

    .extra     { display:flex; flex-direction:column; gap:5px; }
    .ex-row    { display:flex; gap:8px; font-size:12px; align-items:baseline; }
    .ex-lbl    { flex-shrink:0; font-weight:600; color:var(--muted); width:40px; }
    .ex-val    { color:var(--text); line-height:1.4; }
    .ex-val.sm { font-size:11px; }

    .certs     { display:flex; flex-wrap:wrap; gap:4px; }
    .cert-chip { font-size:10px; font-weight:600; padding:2px 7px; border-radius:4px;
                 background:#F1F5F9; color:#475569; border:1px solid #E2E8F0; }
    .nrnd-warn { font-size:11px; color:#92400E; background:#FEF3C7;
                 border:1px solid #FDE68A; padding:5px 8px; border-radius:4px; }

    /* ── Card Body Two-Column Layout ── */
    .card-body-wrap  { display:flex; flex-direction:column; gap:12px; }
    .card-specs-col  { display:flex; flex-direction:column; gap:12px; }

    /* When gap analysis is present: side-by-side */
    .card-with-analysis { border-color:#BFDBFE; }
    .card-with-analysis .card-body-wrap {
      flex-direction:row; gap:0; align-items:flex-start;
    }
    .card-with-analysis .card-specs-col {
      flex:1 1 0; min-width:0; padding-right:16px; border-right:1px solid var(--border);
    }

    /* RFQ Gap Analysis column */
    .card-gap-col   { flex:0 0 260px; padding-left:16px; display:flex;
                      flex-direction:column; gap:8px; }
    .gap-title      { font-size:11px; font-weight:700; text-transform:uppercase;
                      letter-spacing:.6px; color:var(--muted);
                      padding-bottom:6px; border-bottom:1px solid var(--border); }
    .gap-section    { display:flex; flex-direction:column; gap:4px; }
    .gap-row        { display:flex; gap:6px; font-size:12px; line-height:1.4;
                      align-items:flex-start; padding:4px 6px; border-radius:4px; }
    .gap-row.meet   { background:#F0FDF4; }
    .gap-row.gap    { background:#FFFBEB; }
    .gap-icon       { flex-shrink:0; font-size:12px; margin-top:1px; }
    .gap-combo      { display:flex; gap:6px; font-size:12px; line-height:1.4;
                      align-items:flex-start; background:#F0F9FF; padding:6px 8px;
                      border-radius:4px; border:1px solid #BAE6FD; margin-top:4px; }

    /* Stacked list for recommended products (full-width, not grid) */
    .rec-list { display:flex; flex-direction:column; gap:16px; }

    /* No hard-match fallback warning */
    .no-match-note { background:#FFFBEB; border:1px solid #FDE68A; border-radius:var(--r);
                     padding:10px 14px; font-size:13px; color:#92400E; line-height:1.5;
                     margin-bottom:16px; }

    /* ── Solution Combination Cards ── */
    .combo-section  { margin-bottom:24px; display:flex; flex-direction:column; gap:12px; }
    .combo-cards    { display:flex; flex-wrap:wrap; gap:12px; }
    .combo-card     { background:linear-gradient(135deg,#EFF6FF,#F0FDF4);
                      border:1px solid #BFDBFE; border-radius:var(--r);
                      padding:14px 16px; flex:1 1 280px;
                      display:flex; flex-direction:column; gap:8px; }
    .combo-products { display:flex; flex-wrap:wrap; align-items:center; gap:6px; }
    .combo-plus     { color:var(--muted); font-size:16px; font-weight:600; }
    .combo-part     { background:var(--blue); color:#fff; padding:2px 10px;
                      border-radius:100px; font-size:12px; font-weight:600; }
    .combo-desc     { font-size:13px; line-height:1.5; color:var(--text); }
    .combo-gaps     { display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-top:4px; }
    .combo-gaps-lbl { font-size:11px; font-weight:600; color:var(--muted); }
    .combo-gap-chip { font-size:11px; background:#FEF3C7; color:#92400E;
                      border:1px solid #FDE68A; padding:2px 8px; border-radius:100px; }

    /* ── Comparison Panel ── */
    .cmp-overlay { position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200;
                   display:flex; align-items:stretch; justify-content:flex-end; }
    .cmp-panel   { background:var(--surf); width:min(900px,95vw); height:100%;
                   display:flex; flex-direction:column; box-shadow:var(--sh-lg); overflow:hidden; }
    .cmp-hdr     { background:var(--head); color:#fff; padding:16px 20px;
                   display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .cmp-hdr h2  { font-size:16px; }
    .cmp-hdr-actions { display:flex; align-items:center; gap:12px; }
    .cmp-ct      { font-size:12px; color:#94A3B8; }
    .cmp-tbl-wrap { flex:1; overflow:auto; padding:16px; }
    .cmp-tbl     { width:100%; border-collapse:collapse; font-size:13px; }
    .cmp-th-spec { text-align:left; padding:10px 12px; background:#F8FAFC;
                   border-bottom:2px solid var(--border); font-size:11px; font-weight:700;
                   text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
                   width:160px; position:sticky; top:0; }
    .cmp-th-prod { text-align:left; padding:10px 12px; background:#F8FAFC;
                   border-bottom:2px solid var(--border); min-width:160px; position:sticky; top:0; }
    .cmp-col-in  { display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .cmp-col-in strong { font-size:13px; }
    .rm-col-btn  { background:none; border:none; color:#9CA3AF; font-size:12px; padding:2px 4px; }
    .rm-col-btn:hover { color:var(--red); }
    .cmp-td-lbl  { padding:8px 12px; font-size:12px; font-weight:600; color:var(--muted);
                   background:#FAFAFA; white-space:nowrap; border-bottom:1px solid #F1F5F9; }
    .cmp-td-val  { padding:8px 12px; font-size:13px; border-bottom:1px solid #F1F5F9;
                   vertical-align:top; }
    .cmp-tbl tr.hl .cmp-td-lbl,
    .cmp-tbl tr.hl .cmp-td-val { background:#EFF6FF; font-weight:600; }
    .cmp-tbl tr.hl .cmp-td-val { color:var(--tops); }

    /* ── Modal ── */
    .modal-ov  { position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:300;
                 display:flex; align-items:center; justify-content:center; padding:20px; }
    .modal     { background:var(--surf); border-radius:12px; width:min(460px,100%);
                 box-shadow:var(--sh-lg); overflow:hidden; display:flex; flex-direction:column; }
    .modal-hdr { background:var(--head); color:#fff; padding:16px 20px;
                 display:flex; align-items:center; justify-content:space-between; }
    .modal-hdr h2 { font-size:16px; }
    .modal-close-btn { background:none; border:none; color:#94A3B8; font-size:16px; padding:2px 6px; }
    .modal-close-btn:hover { color:#fff; }
    .modal-body { padding:20px; display:flex; flex-direction:column; gap:16px; }
    .modal-foot { padding:12px 20px; background:#F8FAFC; border-top:1px solid var(--border);
                  display:flex; justify-content:flex-end; gap:8px; }
    .form-grp   { display:flex; flex-direction:column; gap:6px; }
    .form-lbl   { font-size:13px; font-weight:600; }
    .form-hint  { font-size:12px; color:var(--muted); line-height:1.5; }
    .form-inp   { padding:9px 12px; border:1px solid var(--border); border-radius:var(--r);
                  font-size:13px; width:100%; background:var(--surf); color:var(--text); }
    .form-inp:focus { outline:none; border-color:var(--blue); }
    .form-info  { background:#F8FAFC; border:1px solid var(--border); border-radius:var(--r);
                  padding:12px; font-size:12px; color:var(--muted); }
    .form-info h4 { font-size:12px; font-weight:600; color:var(--text); margin-bottom:6px; }
    .form-info ul { padding-left:16px; display:flex; flex-direction:column; gap:3px; }
    .form-info code { background:#E2E8F0; padding:1px 4px; border-radius:3px; font-size:11px; }

    /* ── Competitor Mode ── */
    .comp-section { display:flex; flex-direction:column; gap:24px; max-width:860px; }
    .comp-in-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--r);
                    padding:24px; display:flex; flex-direction:column; gap:14px; box-shadow:var(--sh); }
    .comp-in-card h3 { font-size:17px; }
    .sec-desc    { font-size:13px; color:var(--muted); line-height:1.5; }
    .mode-toggle { display:flex; background:#F1F5F9; border-radius:8px; padding:3px; gap:2px; width:fit-content; }
    .mtbtn       { padding:6px 14px; border-radius:6px; background:none; border:none;
                   font-size:13px; color:var(--muted); font-weight:500; }
    .mtbtn.active { background:var(--surf); color:var(--text); box-shadow:var(--sh); }
    .manual-note { font-size:12px; color:var(--amber); }
    .comp-result { background:var(--surf); border:1px solid var(--border); border-radius:var(--r);
                   padding:20px; display:flex; flex-direction:column; gap:16px; box-shadow:var(--sh); }
    .comp-res-hdr { display:flex; align-items:center; gap:12px; justify-content:space-between; }
    .comp-res-hdr h3 { font-size:16px; }
    .src-badge   { font-size:11px; background:#F1F5F9; color:var(--muted);
                   padding:3px 8px; border-radius:100px; }
    .comp-sum, .comp-matches { font-size:13px; line-height:1.6; padding:10px 12px;
                                background:#F8FAFC; border-radius:var(--r); }
    .comp-tbl-w  { overflow-x:auto; }
    .comp-tbl    { width:100%; border-collapse:collapse; font-size:13px; }
    .comp-tbl th { padding:8px 12px; background:#F8FAFC; font-size:11px; font-weight:700;
                   text-transform:uppercase; letter-spacing:.5px; color:var(--muted);
                   border-bottom:2px solid var(--border); text-align:left; }
    .comp-tbl td { padding:8px 12px; border-bottom:1px solid #F1F5F9; vertical-align:top; }
    .comp-tbl tr.win { background:#F0FDF4; }
    .comp-tbl .inn-val { font-weight:600; color:#15803D; }
    .comp-body h4 { font-size:13px; font-weight:600; margin-bottom:8px; }
    .comp-body ul,
    .comp-body ol { padding-left:18px; display:flex; flex-direction:column; gap:5px;
                    font-size:13px; line-height:1.5; }

    /* ── Spinners ── */
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner     { width:28px; height:28px; border:3px solid #E2E8F0;
                   border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; }
    .spin-inline { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3);
                   border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; }

    /* ── Loading / Error screens ── */
    .full-screen { height:100vh; display:flex; flex-direction:column; align-items:center;

    .err-hint code { background:#F1F5F9; padding:2px 6px; border-radius:4px; font-size:12px; }

    /* ── Loading results ── */
    .loading-res { display:flex; flex-direction:column; align-items:center;
                   gap:12px; padding:48px 0; color:var(--muted); font-size:14px; }

    /* ── Responsive ── */

<body>
<div id="root"></div>
<script type="module">
import htm                        from 'htm';
import { createElement, Fragment, useState, useEffect, useMemo } from 'react';
import { createRoot }             from 'react-dom/client';
const html = htm.bind(createElement);

/* ============================================================
   UTILS — Formatters
   ============================================================ */
const fmt = {
  temp:   (a,b)  => a==null||b==null ? 'N/A' : `${a}°C ~ ${b}°C`,
  tops:   (v,basis) => { if(v==null) return 'N/A'; const tag=basis?` (${basis})`:''; return v>=1000?`${(v/1000).toFixed(1)}K TOPS${tag}`:`${v} TOPS${tag}`; },
  ram:    v      => v==null ? 'N/A' : `${v} GB`,
  tdp:    v      => v==null ? 'N/A' : `${v}W`,
  conn:   a      => !a?.length ? 'N/A' : a.join(' · '),
  os:     a      => !a?.length ? 'N/A' : a.join(', '),
  line:   l      => ({computing_aiot:'AIoT BU',computing_ipa:'IPA BU',
                       flash:'Flash',dram:'DRAM',camera:'Camera',
                       io:'I/O',networking:'Networking',air_sensor:'Air Sensor'}[l] || l),
  platIcon: p    => ({Intel:'🔵',Qualcomm:'🔴',NXP:'🟢','AMD-Xilinx':'🟡'}[p]||'⚪'),
  lifecycle: s   => s==='EOL'  ? {color:'#DC2626',label:'EOL'}
                  : s==='NRND' ? {color:'#D97706',label:'NRND'}
                               : {color:'#16A34A',label:'Active'},
  badge: (partNo, recs) => {
    if (!recs?.length) return null;
    const i = recs.indexOf(partNo);
    if (i===0) return {label:'Best Match',  bg:'#16A34A'};
    if (i===1) return {label:'Strong Match', bg:'#2563EB'};
    if (i>=2 && i<=4) return {label:'Good Match', bg:'#7C3AED'};
    return null;
  },
  // ── v3.0 formatters ──────────────────────────────────────────────────────
  cores: cs => {
    const t = cs?.cpu_cores, p = cs?.cpu_p_cores, e = cs?.cpu_e_cores;
    if (!t) return '—';
    if (p != null && e != null && e > 0) return `${t} (${p}P+${e}E)`;
    return `${t}`;
  },
  mem: cs => {
    const ms = cs?.memory_spec;
    if (!ms?.type && !cs?.ram_gb) return '—';
    const parts = [];
    if (ms?.type)      parts.push(ms.type);
    if (ms?.speed_mhz) parts.push(`${ms.speed_mhz} MHz`);
    const cap = ms?.max_capacity_gb ?? cs?.ram_gb;
    if (cap)           parts.push(`up to ${cap} GB`);
    if (ms?.slots != null) parts.push(ms.slots===0 ? 'on-board' : `${ms.slots}-slot`);
    return parts.join(' / ') || '—';
  },
  dim: cs => {
    const d = cs?.dimensions;
    if (!d || (d.width_mm == null && d.depth_mm == null && d.height_mm == null)) return '—';
    return [d.width_mm, d.depth_mm, d.height_mm]
      .map(v => v != null ? v : '?')
      .join(' × ') + ' mm';
  },
  m2: cs => {
    const slots = cs?.m2_slots;
    if (!slots?.length) return '—';
    return slots.map(s => {
      const sz  = s.size ? ` ${s.size}` : '';
      const ifc = s.interface?.length ? ` (${s.interface.join('/')})` : '';
      return `${s.count}×${sz} ${s.key}-Key${ifc}`;
    }).join(', ');
  },
  usb: io => {
    const u = io?.usb;
    if (!u?.length) return '—';
    return u.map(x => {
      const c = x.connector ? ` ${x.connector}` : '';
      return `${x.count}× ${x.standard}${c}`;
    }).join(', ');
  },
  gbe: io => {
    const g = io?.gbe;
    if (!g?.length) return '—';
    return g.map(x => `${x.count}× ${x.speed_gbps}GbE${x.poe_support?' +PoE':''}`).join(', ');
  },
  serial: io => {
    const s = io?.serial;
    if (!s?.length) return '—';
    return s.map(x => `${x.count}× ${x.standard}`).join(', ');
  },
  gpio: io => {
    const parts = [];
    if (io?.gpio_pins)      parts.push(`${io.gpio_pins}-pin GPIO`);
    if (io?.can_bus_count)  parts.push(`${io.can_bus_count}× CAN`);
    if (io?.sim_slot_count) parts.push(`${io.sim_slot_count}× SIM`);
    return parts.join(', ') || '—';
  },
};

/* ============================================================
   UTILS — Filter
   ============================================================ */
function filterProducts(products, criteria) {
  if (!criteria) return products;
  return products.filter(p => {
    const cs = p.computing_spec || {}, co = p.common || {};
    if (criteria.product_lines?.length && !criteria.product_lines.includes(p.meta.product_line)) return false;
    if (criteria.min_ai_tops != null && (cs.ai_tops==null || cs.ai_tops < criteria.min_ai_tops)) return false;
    if (criteria.max_tdp_watt != null && cs.tdp_watt != null && cs.tdp_watt > criteria.max_tdp_watt) return false;
    if (criteria.min_op_temp_c != null && (co.op_temp_min_c==null || co.op_temp_min_c > criteria.min_op_temp_c)) return false;
    if (criteria.max_op_temp_c != null && (co.op_temp_max_c==null || co.op_temp_max_c < criteria.max_op_temp_c)) return false;
    if (criteria.os_required?.length) {
      const os = (cs.os_support||[]).map(s=>s.toLowerCase());
      if (!criteria.os_required.some(r => os.some(s => s.includes(r.toLowerCase())))) return false;
    }
    return true;
  });
}
function sortProducts(products, recs) {
  const m = new Map((recs||[]).map((id,i)=>[id,i]));
  return [...products].sort((a,b) => {
    const ar = m.get(a.meta.part_no)??999, br = m.get(b.meta.part_no)??999;
    if (ar!==br) return ar-br;
    return (b.computing_spec?.ai_tops??0) - (a.computing_spec?.ai_tops??0);
  });
}

/* ============================================================
   UTILS — Anthropic API
   ============================================================ */
const API = 'https://api.anthropic.com/v1/messages';
const MODEL = 'claude-haiku-4-5';

function buildSummary(products) {
  return products.map(p => {
    const cs=p.computing_spec||{}, co=p.common||{};
    return [p.meta.part_no, cs.processor_model||cs.platform_brand||'?',
      cs.ai_tops!=null?`${cs.ai_tops}T`:null,
      cs.tdp_watt!=null?`${cs.tdp_watt}W`:null,
      co.op_temp_min_c!=null?`${co.op_temp_min_c}~${co.op_temp_max_c}°C`:null,
      cs.os_support?.join('/')||null, cs.connectivity?.slice(0,5).join(',')||null,
      p.meta.product_line, p.meta.bu_owner].filter(Boolean).join(' | ');
  }).join('\n');
}

async function apiCall(system, user, apiKey, maxTokens=1024) {
  const r = await fetch(API, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({ model:MODEL, max_tokens:maxTokens,
                           system, messages:[{role:'user',content:user}] })
  });
  if (!r.ok) {
    const e = await r.json().catch(()=>({}));
    let msg = e.error?.message || `API error ${r.status}`;
    if (r.status===401) msg='Invalid API key — open Settings to update.';
    throw new Error(msg);
  }
  const d = await r.json();
  const text = d.content?.[0]?.text || '';

  // Attempt 1: direct parse (clean response)
  try { return JSON.parse(text); } catch {}

  // Attempt 2: strip markdown code fences (```json ... ```)
  const stripped = text.replace(/^```(?:json)?\s*/,'').replace(/\s*```\s*$/,'').trim();
  try { return JSON.parse(stripped); } catch {}

  // Attempt 3: extract from first { to last } (handles leading/trailing prose)
  const start = text.indexOf('{'), end = text.lastIndexOf('}');
  if (start !== -1 && end > start) {
    try { return JSON.parse(text.slice(start, end + 1)); } catch {}
  }

  console.error('[apiCall] Raw response text:', text);
  throw new Error('Failed to parse API response. Please try again.');
}

async function querySelector(requirement, products, apiKey) {
  const summary = buildSummary(products);
  const prompt =
`Customer requirement: "${requirement}"

Catalog (PART | Processor | TOPS | TDP | Temp | OS | IO | line | BU):
${summary}

Return ONLY this JSON (no markdown fences):
{
  "structured_criteria": {
    "product_lines": null,
    "min_ai_tops": null,
    "max_tdp_watt": null,
    "min_op_temp_c": null,
    "max_op_temp_c": null,
    "os_required": [],
    "keywords": []
  },
  "recommended_part_nos": [],
  "recommendation_summary": "",
  "key_tradeoffs": "",
  "product_analysis": {
    "PART_NO": {
      "meets": [],
      "gaps": [],
      "combination_suggestion": null
    }
  },
  "solution_combinations": [
    {
      "products": [],
      "description": "",
      "remaining_gaps": []
    }
  ]
}

Rules:
- recommended_part_nos: 3–5 best matches, best first
- product_analysis: one entry per recommended product
  - meets: specs that satisfy requirement (e.g. "97 TOPS ✓ exceeds 30T required")
  - gaps: specs that fall short (e.g. "Op temp 60°C — 10°C below 70°C required")
  - combination_suggestion: if gaps exist, suggest an Innodisk accessory/expansion card to close the gap (e.g. "Add Innodisk PCIe I/O card for 4x USB3.2 Gen2"), or null
- solution_combinations: 1–2 practical product bundles using Innodisk products that together satisfy all requirements. Only include if no single product fully meets criteria.
- If a product fully meets all criteria, set solution_combinations to []`;

  return apiCall(
    'You are a product selector for Innodisk edge AI products. Respond with valid JSON only — no markdown fences, no explanation outside the JSON.',
    prompt,
    apiKey, 2800
  );
}

async function queryCompetitor(input, products, apiKey, isManual) {
  const summary = buildSummary(products);
  const src = isManual ? `Competitor specs (manually provided):\n${input}` : `Competitor product: "${input}"`;
  return apiCall(
    'You are a competitive intelligence assistant for Innodisk. Respond with valid JSON only.',
    `${src}\n\nInnodisk catalog:\n${summary}\n\n`+
    `Return: {"competitor_name":"","competitor_specs_summary":"","closest_innodisk_matches":[],`+
    `"comparison_table":[{"spec":"","competitor":"","innodisk":"","innodisk_wins":true}],`+
    `"innodisk_advantages":[],"talking_points":[],"data_source":"${isManual?'manually_provided':'inferred'}"}`,
    apiKey, 2048
  );
}

    key.trim() ? localStorage.setItem('claude_api_key',key.trim()) : localStorage.removeItem('claude_api_key');
    setSaved(true); setTimeout(()=>{ setSaved(false); onClose(); }, 800);
  };
  return html`
    <div class="modal-ov" onClick=${onClose}>
      <div class="modal" onClick=${e=>e.stopPropagation()}>
        <div class="modal-hdr">
          <h2>Settings</h2>
          <button class="modal-close-btn" onClick=${onClose}>✕</button>
        </div>

            <input type="password" class="form-inp" value=${key} onInput=${e=>setKey(e.target.value)}

// ── Camera Card ──
function CameraCard({ product, recs, sel, onToggle }) {

    <div class=${'card'+(sel?' sel':'')+(badge?' matched':'')}>
      ${badge && html`<div class="match-badge" style=${{background:badge.bg}}>✓ ${badge.label}</div>`}

            <div class="spec-cell"><span class="sc-lbl">FPS</span><span class="sc-val">${cam.fps ? cam.fps+' fps' : '—'}</span></div>
            <div class="spec-cell"><span class="sc-lbl">Sensor</span><span class="sc-val sm">${cam.sensor_size||'—'}</span></div>
            <div class="spec-cell sc-temp"><span class="sc-lbl">Op Temp</span><span class="sc-val">${fmt.temp(co.op_temp_min_c,co.op_temp_max_c)}</span></div>
          </div>
          <div class="extra">
            ${cam.lens_fov_deg && html`<div class="ex-row"><span class="ex-lbl">FOV</span><span class="ex-val">${cam.lens_fov_deg}°</span></div>`}
            ${(cam.hdr||cam.low_light||cam.ir_filter) && html`<div class="ex-row">

            ${(cam.adapter_board_compatible?.length > 0) && html`<div class="ex-row"><span class="ex-lbl">Compat</span><span class="ex-val sm">${cam.adapter_board_compatible.join(', ')}</span></div>`}
          </div>

        </div>
      </div>
    </div>`;
}

// ── Product Card ──
function ProductCard({ product, recs, sel, onToggle, analysis }) {
  if (product.meta.product_line === 'camera') {
    return html`<${CameraCard} product=${product} recs=${recs} sel=${sel} onToggle=${onToggle} />`;
  }
  const m=product.meta, cs=product.computing_spec||{}, co=product.common||{};
  const badge=fmt.badge(m.part_no,recs), lc=fmt.lifecycle(co.lifecycle_status);
  const hasAnalysis = analysis && (analysis.meets?.length > 0 || analysis.gaps?.length > 0);
  return html`
    <div class=${'card'+(sel?' sel':'')+(badge?' matched':'')+(hasAnalysis?' card-with-analysis':'')}>
      ${badge && html`<div class="match-badge" style=${{background:badge.bg}}>✓ ${badge.label}</div>`}

      <div class="card-body-wrap">
        <!-- Left: specs -->
        <div class="card-specs-col">
          <div class="card-hdr">
            <div class="card-title-g">
              <span class="plat-icon">${fmt.platIcon(cs.platform_brand)}</span>
              <div>
                <h3 class="part-no">${m.part_no}</h3>
                <div class="card-tags">
                  <span class="tag tag-bu">${fmt.line(m.product_line)}</span>
                  <span class="tag" style=${{color:lc.color,borderColor:lc.color}}>${lc.label}</span>
                </div>
              </div>
            </div>
            <label class="cmp-toggle">
              <input type="checkbox" checked=${sel} onChange=${()=>onToggle(m.part_no)} />
              <span>Compare</span>
            </label>
          </div>
          <div class="card-proc">${cs.processor_model||cs.platform_brand||'—'}</div>
          ${cs.cpu_cores && html`<div class="card-cores">${fmt.cores(cs)} cores${cs.processor_series?' · '+cs.processor_series:''}</div>`}
          <div class="spec-grid">
            <div class="spec-cell sc-hl"><span class="sc-lbl">AI TOPS</span><span class="sc-val tops-val">${fmt.tops(cs.ai_tops, cs.ai_tops_basis)}</span></div>
            <div class="spec-cell"><span class="sc-lbl">TDP</span><span class="sc-val">${fmt.tdp(cs.tdp_watt)}</span></div>
            <div class="spec-cell"><span class="sc-lbl">Memory</span><span class="sc-val sm">${fmt.mem(cs)}</span></div>
            <div class="spec-cell sc-temp"><span class="sc-lbl">Op Temp</span><span class="sc-val">${fmt.temp(co.op_temp_min_c,co.op_temp_max_c)}</span></div>
          </div>
          <div class="extra">
            <div class="ex-row"><span class="ex-lbl">OS</span><span class="ex-val">${fmt.os(cs.os_support)}</span></div>
            ${(cs.io_ports?.usb?.length > 0) && html`<div class="ex-row"><span class="ex-lbl">USB</span><span class="ex-val sm">${fmt.usb(cs.io_ports)}</span></div>`}
            ${(cs.io_ports?.gbe?.length > 0) && html`<div class="ex-row"><span class="ex-lbl">GbE</span><span class="ex-val sm">${fmt.gbe(cs.io_ports)}</span></div>`}
            ${(cs.io_ports?.serial?.length > 0) && html`<div class="ex-row"><span class="ex-lbl">COM</span><span class="ex-val sm">${fmt.serial(cs.io_ports)}</span></div>`}
            ${(cs.m2_slots?.length > 0) && html`<div class="ex-row"><span class="ex-lbl">M.2</span><span class="ex-val sm">${fmt.m2(cs)}</span></div>`}
            <div class="ex-row"><span class="ex-lbl">Conn</span><span class="ex-val sm">${fmt.conn(cs.connectivity)}</span></div>
            ${fmt.dim(cs)!=='—' && html`<div class="ex-row"><span class="ex-lbl">Size</span><span class="ex-val">${fmt.dim(cs)}</span></div>`}
            ${cs.power_input   && html`<div class="ex-row"><span class="ex-lbl">Pwr</span><span class="ex-val">${cs.power_input}</span></div>`}
          </div>
          ${co.certifications?.length > 0 && html`<div class="certs">${co.certifications.map(c=>html`<span class="cert-chip">${c}</span>`)}</div>`}
          ${co.lifecycle_status==='NRND' && html`<div class="nrnd-warn">⚠ Not Recommended for New Designs</div>`}
        </div>

        <!-- Right: RFQ Gap Analysis (only for recommended products) -->
        ${hasAnalysis && html`
          <div class="card-gap-col">
            <div class="gap-title">RFQ Match Analysis</div>
            ${analysis.meets?.length > 0 && html`
              <div class="gap-section">
                ${analysis.meets.map((m,i)=>html`
                  <div class="gap-row meet" key=${i}>
                    <span class="gap-icon">✅</span>
                    <span>${m}</span>
                  </div>`)}
              </div>`}
            ${analysis.gaps?.length > 0 && html`
              <div class="gap-section">
                ${analysis.gaps.map((g,i)=>html`
                  <div class="gap-row gap" key=${i}>
                    <span class="gap-icon">⚠️</span>
                    <span>${g}</span>
                  </div>`)}
              </div>`}
            ${analysis.combination_suggestion && html`
              <div class="gap-combo">
                <span class="gap-icon">💡</span>
                <span>${analysis.combination_suggestion}</span>
              </div>`}
          </div>`}
      </div>
    </div>`;
}

// ── Solution Combinations ──
function SolutionCombinations({ combos }) {
  if (!combos?.length) return null;
  return html`
    <div class="combo-section">
      <h4 class="sec-label">💡 Suggested Solutions (Product Combinations)</h4>
      <div class="combo-cards">
        ${combos.map((c,i)=>html`
          <div class="combo-card" key=${i}>
            <div class="combo-products">
              ${c.products.map((p,j)=>html`
                <${Fragment} key=${j}>
                  ${j>0 && html`<span class="combo-plus">+</span>`}
                  <span class="combo-part">${p}</span>
                </>`)}
            </div>
            <p class="combo-desc">${c.description}</p>
            ${c.remaining_gaps?.length > 0 && html`
              <div class="combo-gaps">
                <span class="combo-gaps-lbl">Remaining gaps:</span>
                ${c.remaining_gaps.map((g,j)=>html`<span class="combo-gap-chip" key=${j}>${g}</span>`)}
              </div>`}
          </div>`)}
      </div>
    </div>`;
}

// ── Product List ──
function ProductList({ products, recs, sel, onToggle, total, searched, aiResult, noHardMatch }) {
  if (!searched) return html`
    <div>
      <div class="results-hdr"><span class="results-ct">${total} products available — enter a requirement above to filter</span></div>
      <div class="grid">${products.map(p=>html`<${ProductCard} key=${p.meta.part_no} product=${p} recs=${null} sel=${sel.includes(p.meta.part_no)} onToggle=${onToggle} />`)}</div>
    </div>`;

  if (!products.length) return html`
    <div class="empty">
      <div class="empty-icon">🔍</div>
      <h3>No products matched the hard constraints</h3>
      <p>Try relaxing temperature or TOPS requirements, or rephrase the requirement.</p>
    </div>`;

  const recommended = products.filter(p=>recs?.includes(p.meta.part_no));
  const others      = products.filter(p=>!recs?.includes(p.meta.part_no));
  const analysis    = aiResult?.product_analysis || {};
  const combos      = aiResult?.solution_combinations || [];

  return html`
    <div>
      <div class="results-hdr">
        <span class="results-ct">${noHardMatch ? `Closest matches (no exact fit)` : products.length===total?`All ${total} products`:`${products.length} of ${total} products match`}</span>
        ${sel.length>0 && html`<span class="compare-ct">${sel.length} selected</span>`}
      </div>
      ${noHardMatch && html`
        <div class="no-match-note">
          ⚠️ <strong>無產品完全符合全部硬性規格</strong>（如 -40°C 溫度範圍 + 30+ TOPS）。以下為 AI 推薦的最接近替代方案，差距說明請參考右側 RFQ Match Analysis。
        </div>`}

      <!-- Solution combinations (shown before individual cards) -->
      <${SolutionCombinations} combos=${combos} />

      <!-- AI Recommended with gap analysis -->
      ${recommended.length>0 && html`
        <div class="section">
          <h4 class="sec-label">AI Recommended</h4>
          <div class="rec-list">
            ${recommended.map(p=>html`
              <${ProductCard} key=${p.meta.part_no} product=${p} recs=${recs}
                sel=${sel.includes(p.meta.part_no)} onToggle=${onToggle}
                analysis=${analysis[p.meta.part_no]} />`)}
          </div>
        </div>`}

      <!-- Other matches (compact grid, no analysis) -->
      ${others.length>0 && html`
        <div class="section">
          <h4 class="sec-label">${recommended.length>0?'Also Matches Constraints':'Matching Products'}</h4>
          <div class="grid">
            ${others.map(p=>html`<${ProductCard} key=${p.meta.part_no} product=${p} recs=${null} sel=${sel.includes(p.meta.part_no)} onToggle=${onToggle} />`)}</div>
        </div>`}
    </div>`;
}

function exportCsv(products) {
  const esc = v => '"' + String(v ?? '').replace(/"/g,'""') + '"';
  const header = ['Specification', ...products.map(p => p.meta.part_no)];
  const rows   = CMP_ROWS.map(r => [r.label, ...products.map(p => r.fn(p))]);
  const csv    = [header, ...rows].map(r => r.map(esc).join(',')).join('\r\n');
  const blob   = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url    = URL.createObjectURL(blob);
  const a      = Object.assign(document.createElement('a'), {
    href: url, download: 'innodisk_comparison_' + products.map(p=>p.meta.part_no).join('_') + '.csv'
  });
  a.click(); URL.revokeObjectURL(url);
}

const EXAMPLES = [
  {label:'Wide-temp AI box',    text:'工業電腦 -40~70°C, Windows, AI推理 30+ TOPS'},
  {label:'High TOPS inference', text:'High-performance edge AI, 800+ TOPS, for LLM deployment at the edge'},

];

function SearchBar({ onSearch, loading }) {
  const [q, setQ] = useState('');
  const submit = e => { e.preventDefault(); q.trim() && onSearch(q.trim()); };
  return html`
    <div class="search-section">
      <form class="search-form" onSubmit=${submit}>
        <div class="search-wrap">
          <textarea class="search-ta" value=${q} rows="3"
            placeholder=${'描述客戶需求 / Describe customer requirements…\ne.g. industrial AI box, -40°C wide temp, Windows, 30+ TOPS'}
            onInput=${e=>setQ(e.target.value)}
            onKeyDown=${e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();q.trim()&&onSearch(q.trim());} }}
          />
          <button type="submit" class="btn btn-primary search-btn" disabled=${loading||!q.trim()}>
            ${loading ? html`<span class="spin-inline"/>` : '→'}
          </button>
        </div>
        <p class="search-hint">Press Enter · Shift+Enter for new line</p>
      </form>
      <div class="examples">
        <span class="ex-label">Examples:</span>
        ${EXAMPLES.map((ex,i)=>html`
          <button key=${i} class="ex-chip" onClick=${()=>{setQ(ex.text);onSearch(ex.text);}} disabled=${loading}>
            ${ex.label}
          </button>`)}
      </div>
    </div>`;
}

// ── Filter Bar ──
function FilterBar({ products, qf, onChange }) {
  const cnt = useMemo(() => {
    const r = { bu:{IPA:0,AIoT:0}, pl:{Intel:0,Qualcomm:0,NXP:0},
                tg:{Wide:0,Industrial:0,Commercial:0}, lc:{Active:0,NRND:0,EOL:0}, tops:0, cam:0 };
    for (const p of products) {
      const bu = p.meta?.bu_owner;  if (bu) r.bu[bu] = (r.bu[bu]||0)+1;
      const pl = p.computing_spec?.platform_brand; if (pl) r.pl[pl] = (r.pl[pl]||0)+1;
      const tg = p.common?.temp_grade;             if (tg) r.tg[tg] = (r.tg[tg]||0)+1;
      const lc = p.common?.lifecycle_status;       if (lc) r.lc[lc] = (r.lc[lc]||0)+1;
      if (p.computing_spec?.ai_tops != null) r.tops++;
      if (p.meta?.product_line === 'camera') r.cam++;
    }
    return r;
  }, [products]);

  const togArr = (key, val) => {
    const arr = qf[key]||[];
    onChange({ ...qf, [key]: arr.includes(val) ? arr.filter(x=>x!==val) : [...arr,val] });
  };
  const hasAny = qf.bu.length||qf.platform.length||qf.tempGrade.length||qf.lifecycle.length||qf.productLine.length||qf.hasTops;

  // Helper: chip class
  const cc = (grp, val) => 'fchip' + (qf[grp]?.includes(val) ? ' on' : '');

  return html`
    <div class="filter-bar">
      <span class="filter-label">BU</span>
      <button class=${cc('bu','IPA')}  onClick=${()=>togArr('bu','IPA')}>IPA BU <span class="fct">${cnt.bu.IPA||0}</span></button>
      <button class=${cc('bu','AIoT')} onClick=${()=>togArr('bu','AIoT')}>AIoT BU <span class="fct">${cnt.bu.AIoT||0}</span></button>
      ${cnt.cam > 0 && html`<button class=${cc('productLine','camera')} onClick=${()=>togArr('productLine','camera')}>📷 Camera <span class="fct">${cnt.cam}</span></button>`}
      <div class="filter-sep"/>
      <span class="filter-label">Platform</span>
      ${['Intel','Qualcomm','NXP'].filter(pl=>cnt.pl[pl]>0).map(pl=>html`
        <button key=${pl} class=${cc('platform',pl)} onClick=${()=>togArr('platform',pl)}>
          ${pl} <span class="fct">${cnt.pl[pl]}</span>
        </button>`)}
      <div class="filter-sep"/>
      <span class="filter-label">Temp</span>
      ${['Wide','Industrial','Commercial'].filter(t=>cnt.tg[t]>0).map(t=>html`
        <button key=${t} class=${cc('tempGrade',t)} onClick=${()=>togArr('tempGrade',t)}>
          ${t} <span class="fct">${cnt.tg[t]}</span>
        </button>`)}
      <div class="filter-sep"/>
      <span class="filter-label">Status</span>
      ${['Active','NRND','EOL'].filter(s=>cnt.lc[s]>0).map(s=>html`
        <button key=${s} class=${cc('lifecycle',s)} onClick=${()=>togArr('lifecycle',s)}>
          ${s} <span class="fct">${cnt.lc[s]}</span>
        </button>`)}
      <div class="filter-sep"/>
      <button class=${'fchip'+(qf.hasTops?' on':'')} onClick=${()=>onChange({...qf,hasTops:!qf.hasTops})}>
        Has AI TOPS <span class="fct">${cnt.tops}</span>
      </button>
      ${hasAny && html`<button class="fclr" onClick=${()=>onChange({bu:[],platform:[],tempGrade:[],lifecycle:[],productLine:[],hasTops:false})}>✕ Clear</button>`}
    </div>`;
}

// ── Competitor Mode ──
function CompetitorMode({ products }) {
  const [input, setInput] = useState('');
  const [manual, setManual] = useState(false);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [err, setErr] = useState(null);

  const compare = async () => {
    const key = localStorage.getItem('claude_api_key');
    if (!key) { setErr('API key not set — open Settings first.'); return; }
    if (!input.trim()) return;
    setLoading(true); setErr(null); setResult(null);
    try { setResult(await queryCompetitor(input.trim(), products, key, manual)); }
    catch(e) { setErr(e.message); }
    finally { setLoading(false); }
  };

  return html`
    <div class="comp-section">
      <div class="comp-in-card">
        <h3>Competitor Comparison</h3>
        <p class="sec-desc">Enter a competitor model number, or paste spec text to compare against Innodisk products.</p>
        <div class="mode-toggle">
          <button class=${'mtbtn'+(manual?'':' active')} onClick=${()=>setManual(false)}>Model Name</button>
          <button class=${'mtbtn'+(manual?' active':'')} onClick=${()=>setManual(true)}>Paste Specs</button>
        </div>
        <textarea class="search-ta" value=${input} rows=${manual?8:2}
          placeholder=${manual?'Paste competitor product specs here…':'Competitor model number (e.g. "Advantech MIC-720AI", "ADLINK ROScube-X")'}
          onInput=${e=>setInput(e.target.value)} />
        ${manual && html`<p class="manual-note">📌 Output will be labeled "manually provided".</p>`}
        ${err && html`<div class="err-banner"><strong>⚠</strong> ${err}</div>`}
        <button class="btn btn-primary" onClick=${compare} disabled=${loading||!input.trim()}>
          ${loading ? html`<span class="spin-inline"/> Comparing…` : 'Compare →'}
        </button>
      </div>
      ${result && html`
        <div class="comp-result">
          <div class="comp-res-hdr">
            <h3>Comparison: ${result.competitor_name||input}</h3>
            <span class="src-badge">Source: ${result.data_source==='manually_provided'?'📋 Manual':'🤖 AI inferred'}</span>
          </div>
          ${result.competitor_specs_summary && html`<div class="comp-sum"><strong>Competitor:</strong> ${result.competitor_specs_summary}</div>`}
          ${result.closest_innodisk_matches?.length > 0 && html`<div class="comp-matches"><strong>Closest Innodisk:</strong> ${result.closest_innodisk_matches.join(', ')}</div>`}
          ${result.comparison_table?.length > 0 && html`
            <div class="comp-tbl-w">
              <table class="comp-tbl">
                <thead><tr><th>Specification</th><th>${result.competitor_name||'Competitor'}</th><th>Innodisk</th><th>Winner</th></tr></thead>
                <tbody>${result.comparison_table.map((r,i)=>html`
                  <tr class=${r.innodisk_wins?'win':''} key=${i}>
                    <td>${r.spec}</td><td>${r.competitor}</td>
                    <td class="inn-val">${r.innodisk}</td>
                    <td>${r.innodisk_wins?'✅ Innodisk':'—'}</td>
                  </tr>`)}</tbody>
              </table>
            </div>`}
          ${result.innodisk_advantages?.length > 0 && html`
            <div class="comp-body"><h4>Innodisk Advantages</h4><ul>${result.innodisk_advantages.map((a,i)=>html`<li key=${i}>${a}</li>`)}</ul></div>`}
          ${result.talking_points?.length > 0 && html`
            <div class="comp-body"><h4>Sales Talking Points</h4><ol>${result.talking_points.map((t,i)=>html`<li key=${i}>${t}</li>`)}</ol></div>`}
        </div>`}
    </div>`;
}

/* ============================================================
   APP
   ============================================================ */
function App() {
  const [products, setProducts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [loadErr, setLoadErr] = useState(null);
  const [mode, setMode] = useState('select');
  const [searching, setSearching] = useState(false);
  const [searchErr, setSearchErr] = useState(null);
  const [aiResult, setAiResult] = useState(null);
  const [searched, setSearched] = useState(false);
  const [sel, setSel] = useState([]);
  const [showCmp, setShowCmp] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [qf, setQf] = useState({ bu:[], platform:[], tempGrade:[], lifecycle:[], productLine:[], hasTops:false });

  useEffect(() => {
    fetch('./public/spec_matrix.json')
      .then(r => { if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
      .then(data => { setProducts(data); setLoading(false); })
      .catch(e => { setLoadErr(e.message); setLoading(false); });
  }, []);

  const display = useMemo(() => {
    if (!products.length) return [];
    // Apply quick filters first (no API key needed)
    let list = products;
    if (qf.productLine.length) list = list.filter(p => qf.productLine.includes(p.meta.product_line));
    if (qf.bu.length)          list = list.filter(p => qf.bu.includes(p.meta.bu_owner));
    if (qf.platform.length)    list = list.filter(p => qf.platform.includes(p.computing_spec?.platform_brand));
    if (qf.tempGrade.length)   list = list.filter(p => qf.tempGrade.includes(p.common?.temp_grade));
    if (qf.lifecycle.length)   list = list.filter(p => qf.lifecycle.includes(p.common?.lifecycle_status));
    if (qf.hasTops)            list = list.filter(p => p.computing_spec?.ai_tops != null);
    // Then layer AI result on top
    if (!aiResult) return list;
    const filtered = filterProducts(list, aiResult.structured_criteria);
    if (filtered.length === 0 && aiResult.recommended_part_nos?.length) {
      const recs = list.filter(p => aiResult.recommended_part_nos.includes(p.meta.part_no));
      return sortProducts(recs.length ? recs : list.slice(0, 15), aiResult.recommended_part_nos);
    }
    return sortProducts(filtered, aiResult.recommended_part_nos);
  }, [products, aiResult, qf]);

  const noHardMatch = useMemo(() => {
    if (!aiResult || !products.length || !searched) return false;
    return filterProducts(display, aiResult.structured_criteria).length === 0;
  }, [display, aiResult, searched]);

  const cmpProducts = useMemo(() => products.filter(p=>sel.includes(p.meta.part_no)), [products, sel]);

  const doSearch = async q => {
    const key = localStorage.getItem('claude_api_key');
    if (!key) { setShowSettings(true); return; }
    setSearching(true); setSearchErr(null); setAiResult(null); setSearched(true);
    try { setAiResult(await querySelector(q, products, key)); }
    catch(e) { setSearchErr(e.message); }
    finally { setSearching(false); }
  };

  const toggleSel = id => setSel(prev =>
    prev.includes(id) ? prev.filter(x=>x!==id) : prev.length<4 ? [...prev,id] : prev
  );
  const removeCmp = id => {
    const next = sel.filter(x=>x!==id);
    setSel(next);
    if (!next.length) setShowCmp(false);
  };

  if (loading) return html`<div class="full-screen"><div class="spinner"/><p>Loading product catalog…</p></div>`;
  if (loadErr)  return html`
    <div class="full-screen err-screen">
      <div style=${{fontSize:'40px'}}>⚠</div>
      <h2>Cannot load product data</h2>
      <p>${loadErr}</p>
      <p class="err-hint">Run <code>copy_data.ps1</code> to copy <code>spec_matrix.json</code> into <code>public/</code>, then restart the server.</p>
    </div>`;

  return html`
    <div class="app">
      <header class="hdr">
        <div class="hdr-in">
          <div class="brand">
            <span class="brand-hex">⬡</span>
            <div><span class="brand-name">Innodisk</span><span class="brand-sub"> Product Selector</span></div>
          </div>
          <nav class="nav">
            <button class=${'nav-btn'+(mode==='select'?' active':'')} onClick=${()=>setMode('select')}>Product Selection</button>
            <button class=${'nav-btn'+(mode==='compete'?' active':'')} onClick=${()=>setMode('compete')}>Competitor Compare</button>
          </nav>
          <div class="hdr-actions">
            <span class="catalog-ct">${products.length} products</span>
            ${sel.length>0 && html`<button class="btn btn-compare" onClick=${()=>setShowCmp(true)}>Compare (${sel.length})</button>`}
            <button class="btn btn-icon" onClick=${()=>setShowSettings(true)} title="Settings">⚙</button>
          </div>
        </div>
      </header>

      <main class="main">
        ${mode==='select' ? html`
          <${Fragment}>
            ${aiResult && html`
              <div class="ai-card">
                <div class="ai-icon">🤖</div>
                <div class="ai-text">
                  <p class="ai-rec">${aiResult.recommendation_summary}</p>
                  ${aiResult.key_tradeoffs && html`<p class="ai-trade">💡 ${aiResult.key_tradeoffs}</p>`}
                </div>
                <button class="clear-btn" onClick=${()=>{setAiResult(null);setSearched(false);}}>✕</button>
              </div>`}
            ${searchErr && html`
              <div class="err-banner">
                <strong>⚠ Error:</strong> ${searchErr}
                ${searchErr.includes('API key') && html`<button class="btn-link" onClick=${()=>setShowSettings(true)}>Open Settings →</button>`}
              </div>`}
            <${SearchBar} onSearch=${doSearch} loading=${searching} />
            <${FilterBar} products=${products} qf=${qf} onChange=${setQf} />
            ${searching
              ? html`<div class="loading-res"><div class="spinner"/><p>Analyzing requirements with Claude AI…</p></div>`
              : html`<${ProductList} products=${display} recs=${aiResult?.recommended_part_nos} sel=${sel} onToggle=${toggleSel} total=${products.length} searched=${searched} aiResult=${aiResult} noHardMatch=${noHardMatch} />`}
          </>`
        : html`<${CompetitorMode} products=${products} />`}
      </main>

      ${showCmp && cmpProducts.length > 0 && html`<${ComparisonPanel} products=${cmpProducts} onClose=${()=>setShowCmp(false)} onRemove=${removeCmp} />`}
      ${showSettings && html`<${SettingsModal} onClose=${()=>setShowSettings(false)} />`}
    </div>`;
}

createRoot(document.getElementById('root')).render(html`<${App}/>`);
</script>
</body>
</html>
